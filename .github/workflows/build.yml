name: Build StreamPal Broadcaster APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Fix executable permissions on node_modules binaries
        run: chmod -R +x node_modules/.bin

      - name: Capacitor sync
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Decode signing keystore
        if: github.event.inputs.build_type == 'release'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/streampal.keystore

      - name: Build Release APK + AAB
        if: github.event.inputs.build_type == 'release'
        env:
          KEYSTORE_PATH: ../streampal.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease bundleRelease

      - name: Remove keystore file
        if: always() && github.event.inputs.build_type == 'release'
        run: rm -f android/streampal.keystore

      - name: Upload Debug APK
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: StreamPal-Broadcaster-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: StreamPal-Broadcaster-Release-APK
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload Release AAB (for Play Store)
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: StreamPal-Broadcaster-Release-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
